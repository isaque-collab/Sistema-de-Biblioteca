services:
  mysql:
    image: mysql:8.4
    container_name: biblioteca-mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: biblioteca
      MYSQL_USER: biblioteca
      MYSQL_PASSWORD: biblioteca123

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: